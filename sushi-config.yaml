id: ans.fhir.fr.test.ror
canonical: https://interop.esante.gouv.fr/ig/fhir/test-ror
name: MExROR
title: "Modèle d'exposition du ROR dérivant du MOS (POC)"
description: "IG de démonstration illustrant comment définir des modèles logiques ROR qui dérivent des modèles logiques du MOS (Modèle des Objets de Santé)."
publisher:
  name: Agence du Numérique en Santé (ANS) - 2-10 Rue d'Oradour-sur-Glane, 75015 Paris
  url: https://esante.gouv.fr
status: draft
version: 0.1.0
fhirVersion: 4.0.1
copyrightYear: 2024+
releaseLabel: ci-build

jurisdiction: urn:iso:std:iso:3166#FR "France (la)"

dependencies:
  ans.fr.mos: 0.1.0-ballot
  hl7.fhir.uv.xver-r5.r4: 0.1.0

groups:
  ReglesDéGestion:
    name: "Règles de gestion"
    description: "Instances Requirements regroupant les règles de gestion RG_EXP_* du modèle d'exposition ROR"
    resources:
      - Basic/ror-requirements-structure
      - Basic/ror-requirements-organisation
      - Basic/ror-requirements-offre-operationnelle
      - Basic/ror-requirements-tarif
      - Basic/ror-requirements-ressources-operationnelles
      - Basic/ror-requirements-professionnel
      - Basic/ror-requirements-classes-communes

parameters:
    shownav: 'true'
    path-expansion-params: '../../expansion-params.json'
    pin-canonicals: pin-all
    apply-contact: true
    logging:
      - progress
    i18n-default-lang: fr
    apply-jurisdiction: true

